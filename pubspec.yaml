name: drift_sync_core
description: Offline-first synchronization engine for Drift databases. Three-phase reconciliation, typed outcomes, pluggable transport.
version: 0.0.1
homepage: "https://github.com/trakli/mobile"

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  dio: ^5.8.0+1
  drift: ^2.26.0
  logging: ^1.3.0
  meta: ^1.16.0
  # `test` is used by `lib/testing.dart` (the contract test suite consumers
  # run against their own SynchronizerDb implementation). Promoted to a
  # regular dep so the import resolves from consumer test files.
  test: ^1.24.0

dev_dependencies:
  lints: ^4.0.0
