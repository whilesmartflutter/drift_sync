name: drift_sync_core
description: Offline-first synchronization engine for Drift databases. Three-phase reconciliation, typed outcomes, pluggable transport.
version: 0.0.1
homepage: "https://github.com/trakli/mobile"

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  dio: ^5.8.0+1
  drift: ^2.26.0
  logging: ^1.3.0
  meta: ^1.16.0

dev_dependencies:
  test: ^1.24.0
  lints: ^4.0.0
  # `lib/testing.dart` imports `package:test`. Consumers using the
  # contract test suite must add `test` to their own dev_dependencies.
